<nav class="bg-white text-gray-800 flex justify-between items-center w-full px-6 py-2 shadow-md sticky top-0 z-50">

  <div class="flex items-center gap-1.5">
    <button
      (click)="onToggleSidebar()"
      class="h-10 w-10 text-gray-700 rounded-full flex items-center justify-center cursor-pointer">
      <i class="fa-solid fa-bars text-xl rotate-90">|||</i>
    </button>
    <a routerLink="/" class="flex items-center gap-2 group">
      <div class="bg-red-600 h-9 w-12 rounded-lg flex items-center justify-center transition-transform group-hover:scale-105">
        <i class="fa-brands fa-youtube text-white text-2xl">MY</i>
      </div>
      <span class="text-2xl font-extrabold tracking-tighter text-gray-950 transition-colors group-hover:text-red-600">
        MyYoutube
      </span>
    </a>
  </div>

  <div class="flex items-center gap-3">

    <button class="h-10 w-10 text-gray-700 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors">
      <i class="fa-solid fa-video text-xl"></i>
    </button>

    @if (authService.currentUser(); as user) {

      <a routerLink="/search"
         class="h-9 px-4 border border-gray-300 text-gray-700 text-sm rounded-full font-medium hover:bg-gray-100 hover:border-gray-400 transition-all flex items-center gap-2">
        Rechercher
      </a>
      <button
        (click)="onLogout()"
        class="h-9 px-4 border border-gray-300 text-gray-700 text-sm rounded-full font-medium hover:bg-gray-100 hover:border-gray-400 transition-all flex items-center gap-2 cursor-pointer">
        <i class="fa-solid fa-sign-out-alt"></i>
        Déconnexion
      </button>

    } @else {
      <a routerLink="/auth/singup"
         class="h-10 px-5 bg-red-600 text-white rounded-full text-sm font-semibold flex items-center justify-center hover:bg-red-700 hover:scale-105 transition-all shadow-md cursor-pointer">
        S'inscrire
      </a>
      <a routerLink="/auth/login"
         class="h-10 px-5 text-red-600 border border-gray-300 rounded-full text-sm font-semibold flex items-center justify-center hover:bg-red-50 hover:border-red-200 hover:scale-105 transition-all cursor-pointer">
        Se connecter
      </a>
    }
  </div>
